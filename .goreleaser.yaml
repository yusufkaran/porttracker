version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/pt
    binary: pt
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: yusufkaran
      name: homebrew-tap
    name: porttracker
    homepage: "https://github.com/yusufkaran/porttracker"
    description: "Manage your localhost ports and dev server processes"
    license: "MIT"
    install: |
      bin.install "pt"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: yusufkaran
    name: porttracker
